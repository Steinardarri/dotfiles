# Get editor completions based on the config schema
'$schema' = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true
format = '$shell$all'

[character]
success_symbol = '[¾▒ó┐](bold purple)'
error_symbol = '[¾░»ê](bold red)'

[shell]
fish_indicator = '¯╣ü '
bash_indicator = 'Bash'
zsh_indicator = 'Zsh'
powershell_indicator = 'PowerShell'
unknown_indicator = 'Unknown shell'
format = '[¯×ò $indicator]($style) '
style = 'bold purple'
disabled = false

[username]
style_user = 'green bold'
style_root = 'red bold'
format = 'as [$user]($style)'
show_always = true
disabled = false

[hostname]
ssh_only = false
format = '@[$hostname](bold green) '
disabled = false

[directory]
read_only = ' ¯Ö▓'
format = 'in [$path]($style)[$read_only]($read_only_style) '
truncate_to_repo = false
truncation_length = 8
style = 'bold blue'
truncation_symbol = '../'
home_symbol = '´Çò ~'

[cmd_duration]
format = '´öá [$duration](bold blue) '

